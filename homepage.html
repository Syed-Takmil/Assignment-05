<body class="bg-[#F8FAFC]">

    <!-- navbar -->

    <div class="navbar bg-[#FFFFFF] shadow-sm p-6 flex sm:flex-row flex-col justify-between gap-3 mb-[60px]">

  <div class="flex sm:justify-center sm:text-center ">
    <div class="flex items-center gap-2 text-[24px]
    font-semibold border-">
        <img src="assets/github-logo.png" alt="" class="w-[36px]">
        GitHub Issues Tracker</div>
  </div>

  <div class="flex gap-3  ">
  <input 
    type="text" id="search-input"
    placeholder="Search Issues" 
    class="pl-10 input   bg-white text-black"
  />
         <button class="btn btn-primary" id="search-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
            Search</button>
  </div>
</div>

<!-- Buttons -->
 <div class="button-container bg-[#FFFFFF] w-[85%] mx-auto grid  md:flex gap-3 md:gap-2 p-6 mb-4 shadow-sm">
<div class="btn w-full md:w-[100px]" id="all-btn" onclick="Toggle('all-btn')">All</div>
<div class="btn w-full md:w-[100px]" id="open-btn" onclick="Toggle('open-btn')">Open</div>
<div class="btn w-full md:w-[100px]" id="closed-btn" onclick="Toggle('closed-btn')">Closed</div>
 </div>

<!-- Issues Count Section -->
 <section class="flex flex-col sm:flex-row  justify-between bg-[#FFFFFF] w-[85%] mx-auto p-6 items-center gap-4 shadow-sm ">

    <div class="issue-count flex  items-center gap-2 ">
<div class="bg-[#ECE4FF] rounded-full p-2"><img src="assets/Aperture.png" alt=""></div>
<div class="text">
    <h2 class="font-semibold text-[20px]"><span id="issues-count">50</span> Issues</h2>
<p class="text-[16px] text-[#64748B]">Track and manage your project issues</p>
</div>
        </div>

        <div class="flex justify-center items-center  gap-4 ">
          <div class="flex items-center gap-1 ">
            <span class="bg-[#00A96E] rounded-full w-3 h-3">&nbsp;</span>Open
        </div>
          <div class="flex items-center gap-1 "> 
            <span class="bg-[#A855F7] rounded-full w-3 h-3">&nbsp;</span>Closed
        </div>
    </div>

    
 </section>


 <section id="Spinner" class=" flex justify-center items-center py-10 hidden">
 
<span class="loading loading-dots loading-xl"></span>
 </section>
 <!-- ALL Cards Section -->
 <section id="card-container" class=" w-[85%] mx-auto p-6 grid grid-cols-2 gap-3 md:grid-cols-4 ">
 </section>
